[package]
edition = "2021"
name = "alpen-client"
version = "0.3.0-alpha.1"

[lints]
workspace = true

[features]
default = ["sequencer", "sp1"]
sequencer = [
  "dep:alpen-ee-da-provider",
  "dep:alpen-ee-da-runtime",
  "dep:alpen-ee-exec-chain",
  "dep:alpen-ee-sequencer",
  "dep:alpen-reth-exex",
  "dep:alloy-eips",
  "dep:alloy-rpc-types-engine",
  "dep:bitcoind-async-client",
  "dep:reth-payload-builder",
  "dep:strata-btcio",
]
# SP1 remote proving for the EE chunk + acct provers. Required for
# production; native-only test builds can drop this feature.
sp1 = ["dep:zkaleido-sp1-host", "strata-paas/remote", "strata-zkvm-hosts/sp1"]

[[bin]]
name = "alpen-client"
path = "src/main.rs"

[dependencies]
alloy-consensus.workspace = true
alloy-rlp.workspace = true
alpen-chainspec.workspace = true
alpen-ee-common.workspace = true
alpen-ee-config.workspace = true
alpen-ee-da-provider = { workspace = true, optional = true }
alpen-ee-da-runtime = { workspace = true, optional = true, features = [
  "builders",
] }
alpen-ee-da-types.workspace = true
alpen-ee-database.workspace = true
alpen-ee-engine.workspace = true
alpen-ee-exec-chain = { workspace = true, optional = true }
alpen-ee-genesis.workspace = true
alpen-ee-ol-tracker.workspace = true
alpen-ee-rpc-server.workspace = true
alpen-ee-sequencer = { workspace = true, optional = true }
alpen-reth-db.workspace = true
alpen-reth-evm.workspace = true
alpen-reth-exex = { workspace = true, optional = true }
alpen-reth-node.workspace = true
alpen-reth-witness.workspace = true
bitcoind-async-client = { workspace = true, optional = true }
ssz.workspace = true
strata-acct-types.workspace = true
strata-bridge-params.workspace = true
strata-btcio = { workspace = true, optional = true }
strata-codec.workspace = true
strata-common = { workspace = true, features = ["async"] }
strata-config.workspace = true
strata-db-types.workspace = true
strata-ee-acct-runtime.workspace = true
strata-ee-acct-types.workspace = true
strata-ee-chain-types.workspace = true
strata-ee-chunk-runtime.workspace = true
strata-evm-ee.workspace = true
strata-identifiers.workspace = true
strata-l1-txfmt.workspace = true
strata-logging.workspace = true
strata-ol-rpc-api = { workspace = true, features = ["client"] }
strata-ol-rpc-types.workspace = true
strata-paas.workspace = true
strata-predicate.workspace = true
strata-primitives.workspace = true
strata-proofimpl-alpen-acct.workspace = true
strata-proofimpl-alpen-chunk.workspace = true
strata-proofimpl-predicate-keys.workspace = true
strata-service.workspace = true
strata-snark-acct-runtime.workspace = true
strata-snark-acct-types.workspace = true
strata-zkvm-hosts.workspace = true
zkaleido.workspace = true
zkaleido-sp1-host = { workspace = true, optional = true }


alloy-eips = { workspace = true, optional = true }
alloy-primitives.workspace = true
alloy-rpc-types-engine = { workspace = true, optional = true }
anyhow.workspace = true
async-trait.workspace = true
clap.workspace = true
eyre.workspace = true
http.workspace = true
jsonrpsee = { workspace = true, features = ["http-client", "server", "macros"] }
reth-chainspec.workspace = true
reth-cli-commands.workspace = true
reth-cli-runner.workspace = true
reth-cli-util.workspace = true
reth-db.workspace = true
reth-network.workspace = true
reth-network-api.workspace = true
reth-node-builder.workspace = true
reth-payload-builder = { workspace = true, optional = true }
reth-primitives.workspace = true
reth-primitives-traits.workspace = true
reth-provider.workspace = true
reth-tasks.workspace = true
rsp-primitives.workspace = true
thiserror.workspace = true
tokio.workspace = true
tracing.workspace = true

[dev-dependencies]
proptest.workspace = true
