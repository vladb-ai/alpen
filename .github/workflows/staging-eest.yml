name: Ethereum Execution Spec tests against staging docker.

on:
  schedule:
    - cron: "0 15 * * *" # Daily at 15:00 UTC
  workflow_dispatch: # Manual trigger (optional)

env:
  COMMIT: ${{ github.sha }}

permissions: {}

jobs:
  setup-services-and-run-ef-tests:
    permissions:
      contents: read
      id-token: write
      pull-requests: read
    runs-on: ubuntu-latest
    environment:
      name: development
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Configure AWS ECR Details
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6.2.0
        with:
          role-to-assume: ${{ secrets.AWS_ECR_ROLE }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@d539f0932e70871a027e9d5a9d8fc38589180a64 # v2
        with:
          mask-password: "true"

      - name: Pull alpen-client image from ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY_PREFIX: ${{ vars.ECR_REPOSITORY_PREFIX }}
        run: |
          ECR_REPOSITORY="${ECR_REPOSITORY_PREFIX}/alpen-client"
          TAG=$(aws ecr describe-images \
            --repository-name "${ECR_REPOSITORY}" \
            --query 'sort_by(imageDetails,& imagePushedAt)[-1].imageTags[0]' \
            --output text)

          if [ "${TAG}" = "None" ] || [ -z "${TAG}" ]; then
            echo "No tagged images found in ${ECR_REPOSITORY}"
            exit 1
          fi

          echo "Pulling alpen-client:${TAG}"
          IMG_URL="${ECR_REGISTRY}/${ECR_REPOSITORY}:${TAG}"
          docker pull "${IMG_URL}"
          docker tag "${IMG_URL}" "alpen-client:latest"

      - name: Generate alpen-client keys
        run: |
          pip3 install coincurve
          cd docker && ./init-alpen-client-keys.sh

      - name: Start services
        run: |
          docker compose --env-file docker/.env.alpen-client \
            -f docker/docker-compose-eest.yml up -d --build

      - name: Wait for alpen-client to be ready
        run: |
          echo "Waiting for alpen-client RPC..."
          for _i in $(seq 1 30); do
            if curl -sf -X POST http://localhost:8545 \
              -H "Content-Type: application/json" \
              -d '{"jsonrpc":"2.0","method":"eth_blockNumber","params":[],"id":1}' > /dev/null 2>&1; then
              echo "alpen-client RPC is up"
              exit 0
            fi
            sleep 2
          done
          echo "alpen-client failed to start"
          docker logs alpen_eest
          exit 1

      - name: Run tests
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          git clone https://github.com/alpenlabs/execution-spec-tests
          cd execution-spec-tests
          uv python install 3.11
          uv python pin 3.11
          uv sync --all-extras
          uv run solc-select use 0.8.24 --always-install
          uv run execute remote \
            -m state_test \
            --fork=Shanghai \
            --rpc-endpoint=http://localhost:8545 \
            --rpc-seed-key 0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80 \
            --rpc-chain-id 2892 \
            --tx-wait-timeout 30 \
            -v

      - name: Tear down services
        if: always()
        run: |
          docker logs alpen_eest || true
          docker compose --env-file docker/.env.alpen-client \
            -f docker/docker-compose-eest.yml down
