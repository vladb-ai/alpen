name: Codex Watcher

# Finds new upstream Codex reviews and dispatches our Claude shadow review on the
# exact reviewed commit (deduped against the tracking issue). Grows the comparison corpus.
# NOTE: `schedule` is DISABLED BY DEFAULT on forks — enable it once in the Actions tab,
# or run via "Run workflow". In the alpenlabs org (not a fork) the schedule runs normally.

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "1 = scan and report only (no dispatch)"
        required: false
        default: "0"

permissions:
  contents: read
  actions: write # to dispatch codex-shadow-review.yml
  issues: read

jobs:
  watch:
    runs-on: ubuntu-latest
    env:
      # PAT (with workflow scope) if present, else the built-in token.
      # github.token may be blocked from dispatching by anti-recursion — set WATCHER_PAT if so.
      GH_TOKEN: ${{ secrets.WATCHER_PAT || github.token }}
      DRY_RUN: ${{ inputs.dry_run || '0' }}
      TRACKING_ISSUE: "28"
    steps:
      - uses: actions/checkout@v4
      - run: bash tools/ai-review/codex-watch.sh
