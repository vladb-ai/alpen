# Generates deployment params (ol-params, asm-params) using the prebuilt
# datatool image from the specified commit. Static values (operator keys,
# denomination, etc.) come from pre-committed templates per environment;
# dynamic values (VKs, genesis L1 anchor, genesis_ol_blkid) are filled in by
# datatool.
#
# Ref: STR-3635

name: CI — Generate Params

on:
  workflow_dispatch:
    inputs:
      env:
        description: "Environment (template set)"
        required: true
        type: choice
        options:
          - staging-v2
          - prod
      commit:
        description: "Alpen commit SHA (first 7 chars are used as the datatool image tag)"
        required: true
        type: string
      checkout_ref:
        description: "Repo ref to checkout (default: workflow ref)"
        required: false
        type: string
      genesis_l1_height:
        description: "Genesis L1 block height"
        required: true
        type: string
      chain_config:
        description: "Path to chainspec JSON (relative to repo root)"
        required: false
        type: string
        default: "crates/reth/chainspec/src/res/testnet-chain.json"

env:
  AWS_REGION: us-east-1
  DATATOOL_REPO: 496607027995.dkr.ecr.us-east-1.amazonaws.com/strata/strata-datatool

concurrency:
  group: ci-genparams-${{ github.ref }}
  cancel-in-progress: true

jobs:
  generate-params:
    name: Generate params (${{ inputs.env }}, ${{ inputs.commit }})
    runs-on: ubuntu-latest
    environment: ${{ inputs.env }}
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Resolve params inputs
        id: resolve
        env:
          INPUT_COMMIT: ${{ inputs.commit }}
          INPUT_CHECKOUT_REF: ${{ inputs.checkout_ref }}
          WORKFLOW_SHA: ${{ github.sha }}
        run: |
          set_output() {
            echo "$1=$2" >> "$GITHUB_OUTPUT"
          }

          SHORT_TAG="${INPUT_COMMIT:0:7}"

          if [ -n "${INPUT_CHECKOUT_REF}" ]; then
            # Manual override: use caller-provided scripts/templates.
            CHECKOUT_REF="${INPUT_CHECKOUT_REF}"
          else
            # By default, use the workflow ref so pushed template changes are used.
            CHECKOUT_REF="${WORKFLOW_SHA}"
          fi

          set_output short_tag "${SHORT_TAG}"
          set_output commit_sha "${INPUT_COMMIT}"
          set_output checkout_ref "${CHECKOUT_REF}"
          echo "Selected datatool image tag: ${SHORT_TAG}"
          echo "Checkout ref: ${CHECKOUT_REF}"

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v5
        with:
          ref: ${{ steps.resolve.outputs.checkout_ref }}
          persist-credentials: false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37 # v4
        with:
          role-to-assume: ${{ secrets.SHARED_ECR_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@19d944daaa35f0fa1d3f7f8af1d3f2e5de25c5b7 # v2
        with:
          mask-password: "true"

      - name: Pull datatool image
        env:
          COMMIT: ${{ steps.resolve.outputs.short_tag }}
        run: docker pull "${DATATOOL_REPO}:${COMMIT}"

      - name: Verify chainspec
        env:
          CHAIN_CONFIG: ${{ inputs.chain_config }}
        run: |
          echo "Chain config: ${CHAIN_CONFIG}"
          python3 -c "import json,os; d=json.load(open(os.environ['CHAIN_CONFIG'])); print(f'chainId: {d[\"config\"][\"chainId\"]}')"

      - name: Generate params
        env:
          DEPLOY_ENV: ${{ inputs.env }}
          COMMIT: ${{ steps.resolve.outputs.short_tag }}
          GENESIS_L1_HEIGHT: ${{ inputs.genesis_l1_height }}
          CHAIN_CONFIG: ${{ inputs.chain_config }}
          BTC_RPC_URL: ${{ secrets.PARAMS_BTC_RPC_URL }}
          BTC_RPC_USER: ${{ secrets.PARAMS_BTC_RPC_USER }}
          BTC_RPC_PASSWORD: ${{ secrets.PARAMS_BTC_RPC_PASSWORD }}
        run: .github/params/generate-params.sh

      - name: ol-params.json
        if: always()
        env:
          DEPLOY_ENV: ${{ inputs.env }}
        run: python3 -m json.tool ".github/params/out/${DEPLOY_ENV}/ol-params.json" 2>/dev/null || echo "Not generated"

      - name: asm-params.json
        if: always()
        env:
          DEPLOY_ENV: ${{ inputs.env }}
        run: python3 -m json.tool ".github/params/out/${DEPLOY_ENV}/asm-params.json" 2>/dev/null || echo "Not generated"

      - name: Upload params artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: params-${{ inputs.env }}-${{ steps.resolve.outputs.short_tag }}
          path: .github/params/out/${{ inputs.env }}/
          retention-days: 30
