# Runs unit tests, functional tests and publishes coverage.

name: Tests with coverage

on:
  pull_request:
  merge_group:
  push:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}-test-coverage
  cancel-in-progress: true

permissions: {}

jobs:
  unit-tests:
    uses: ./.github/workflows/unit.yml

  functional-tests:
    uses: ./.github/workflows/functional.yml

  collect-test-metrics:
    name: Collect test metrics
    runs-on: ubuntu-latest
    if: always()
    needs: [functional-tests]
    permissions:
      contents: read
      actions: read
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Collect and send metrics
        env:
          GRAFANA_CLOUD_INFLUX_URL: ${{ secrets.GRAFANA_CLOUD_INFLUX_URL }} # zizmor: ignore[secrets-outside-env]
          GRAFANA_CLOUD_INFLUX_USER: ${{ secrets.GRAFANA_CLOUD_INFLUX_USER }} # zizmor: ignore[secrets-outside-env]
          GRAFANA_CLOUD_API_KEY: ${{ secrets.GRAFANA_CLOUD_API_KEY }} # zizmor: ignore[secrets-outside-env]
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REF: ${{ github.ref }}
          GITHUB_ACTOR: ${{ github.actor }}
        working-directory: .github/scripts/grafana
        run: |
          uv run --no-project python send-metrics.py

      - name: Summary
        if: success()
        env:
          GRAFANA_URL: ${{ secrets.GRAFANA_URL }} # zizmor: ignore[secrets-outside-env]
        run: |
          {
            echo "Test metrics sent to Grafana Cloud"
            echo ""
            echo "View dashboard: ${GRAFANA_URL}/d/test-flakiness/test-flakiness-tracker"
          } >> "$GITHUB_STEP_SUMMARY"

  publish-coverage:
    name: Publish coverage reports
    runs-on: ubuntu-latest
    if: always()
    needs: [unit-tests, functional-tests]
    timeout-minutes: 10
    steps:
      # NOTE: codecov action needs source files in the same path as in the lcov.info
      # ensure the source location is same in unit test, functional test and this job
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Download unit test coverage
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: unit-lcov

      - name: Publish Unit Test Coverage
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }} # zizmor: ignore[secrets-outside-env]
          files: ./lcov.unit.info
          flags: unit
          name: unit-coverage

      - name: Download functional test coverage
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: functional-lcov

      - name: Publish Functional Test Coverage
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }} # zizmor: ignore[secrets-outside-env]
          files: ./lcov.functional.info
          flags: functional
          name: functional-coverage
