# Runs the full sequencer stack with real SP1 Groth16 proofs.
# Validates checkpoint + EE batch proof generation and verification end-to-end.
#
# Reuses prebuilt images from ci-build (same SHA). If images are not yet
# available, retries for up to 3 minutes before failing.

name: CI — SP1 E2E Proving Test

on:
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to test (default: current SHA short)"
        required: false
        type: string
      checkout_ref:
        description: "Repo ref to checkout (default: image commit SHA)"
        required: false
        type: string

env:
  AWS_REGION: us-east-1

concurrency:
  group: ci-sp1-e2e
  cancel-in-progress: true

jobs:
  check-new-commits:
    name: Check for new commits
    runs-on: ubuntu-latest
    permissions:
      actions: read
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
      short_tag: ${{ steps.check.outputs.short_tag }}
      commit_sha: ${{ steps.check.outputs.commit_sha }}
      checkout_ref: ${{ steps.check.outputs.checkout_ref }}
    steps:
      - name: Check for new commits since last success
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_IMAGE_TAG: ${{ inputs.image_tag }}
          INPUT_CHECKOUT_REF: ${{ inputs.checkout_ref }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set_output() {
            echo "$1=$2" >> "$GITHUB_OUTPUT"
          }

          REPO="${{ github.repository }}"

          if [ -n "${INPUT_IMAGE_TAG}" ]; then
            # Manual tag: resolve the full commit SHA that produced the image.
            SHORT_TAG="${INPUT_IMAGE_TAG}"
            SHORT_TAG="${SHORT_TAG:0:7}"
            BUILD_SHA=$(gh run list -R "${REPO}" \
              --workflow ci-build.yml \
              --status success \
              --limit 100 \
              --json headSha \
              --jq ".[] | select(.headSha | startswith(\"${SHORT_TAG}\")) | .headSha" | head -n1)
          else
            # Scheduled/default run: use the latest successful main image build.
            BUILD_SHA=$(gh run list -R "${REPO}" \
              --workflow ci-build.yml \
              --branch main \
              --status success \
              --limit 1 \
              --json headSha \
              --jq '.[0].headSha // ""')
            SHORT_TAG="${BUILD_SHA:0:7}"
          fi

          if [ -z "${BUILD_SHA}" ]; then
            echo "::error::No successful ci-build found for ${SHORT_TAG:-main}"
            set_output should_run false
            exit 0
          fi

          set_output short_tag "${SHORT_TAG}"
          set_output commit_sha "${BUILD_SHA}"
          set_output checkout_ref "${INPUT_CHECKOUT_REF:-${BUILD_SHA}}"
          echo "Selected image build: ${SHORT_TAG} (${BUILD_SHA})"

          if [ "${EVENT_NAME}" = "workflow_dispatch" ]; then
            echo "Manual trigger — running"
            set_output should_run true
            exit 0
          fi

          # Scheduled: skip if we already tested this build
          LAST_SUCCESS=$(gh run list -R "${REPO}" \
            --workflow ci-sp1-e2e.yml \
            --event schedule \
            --status success \
            --limit 1 \
            --json headSha \
            --jq '.[0].headSha // ""')

          if [ "${LAST_SUCCESS}" = "${BUILD_SHA}" ]; then
            echo "Already tested build ${SHORT_TAG} — skipping"
            set_output should_run false
          else
            echo "New build ${SHORT_TAG} not yet tested — running"
            set_output should_run true
          fi

  sp1-e2e:
    name: SP1 E2E Proof Verification
    needs: [check-new-commits]
    if: needs.check-new-commits.outputs.should_run == 'true'
    runs-on: ubuntu-latest-m
    timeout-minutes: 50
    environment: prod
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.check-new-commits.outputs.checkout_ref }}
          persist-credentials: false

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6.2.0
        env:
          ROLE_ARN: ${{ secrets.SHARED_ECR_ROLE_ARN }}
        with:
          role-to-assume: ${{ env.ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@d539f0932e70871a027e9d5a9d8fc38589180a64 # v2
        with:
          mask-password: "true"

      - name: Pull images (retry up to 5 min)
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}/${{ vars.SHARED_ECR_REPOSITORY_PREFIX }}
          IMAGE_TAG: ${{ needs.check-new-commits.outputs.short_tag }}
        run: |
          IMAGES="strata alpen-client strata-signer strata-datatool"
          DEADLINE=$((SECONDS + 300))
          while [ $SECONDS -lt $DEADLINE ]; do
            ALL_PULLED=true
            for img in $IMAGES; do
              docker pull -q "${ECR_REGISTRY}/${img}:${IMAGE_TAG}" || ALL_PULLED=false
            done
            if [ "$ALL_PULLED" = true ]; then
              echo "All images pulled"
              exit 0
            fi
            echo "Some images not yet available, retrying in 30s..."
            sleep 30
          done
          echo "::error::Images not available after 5 minutes. ci-build may not have run for ${IMAGE_TAG}."
          exit 1

      - name: Install dependencies
        run: |
          pip install -q coincurve
          sudo apt-get update -qq && sudo apt-get install -y -qq jq > /dev/null

      - name: Run SP1 E2E test
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}/${{ vars.SHARED_ECR_REPOSITORY_PREFIX }}
          IMAGE_TAG: ${{ needs.check-new-commits.outputs.short_tag }}
          NETWORK_PRIVATE_KEY: ${{ secrets.NETWORK_PRIVATE_KEY }}
        run: |
          chmod +x .github/sp1-e2e/run-test.sh
          .github/sp1-e2e/run-test.sh

      - name: Chain state
        if: always()
        run: cat .github/sp1-e2e/e2e-state.txt 2>/dev/null || echo "No state collected"

      - name: Generated params
        if: always()
        run: cat .github/sp1-e2e/e2e-params.txt 2>/dev/null || echo "No params collected"

      - name: Alpen env
        if: always()
        run: cat .github/sp1-e2e/e2e-env.txt 2>/dev/null || echo "No env collected"

      - name: WARN/ERROR summary
        if: always()
        run: |
          SUMMARY_FILE=".github/sp1-e2e/e2e-warn-error-summary.txt"
          if [ ! -s "${SUMMARY_FILE}" ]; then
            echo "No WARN/ERROR summary collected"
            exit 0
          fi

          cat "${SUMMARY_FILE}"
          {
            echo "## WARN/ERROR log summary"
            echo
            echo '```text'
            head -300 "${SUMMARY_FILE}"
            echo '```'
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: sp1-e2e-logs
          path: |
            .github/sp1-e2e/e2e-logs.txt
            .github/sp1-e2e/e2e-warn-error-summary.txt
          retention-days: 7

      - name: Notify Slack on failure
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          IMAGE_TAG: ${{ needs.check-new-commits.outputs.short_tag }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "${SLACK_WEBHOOK_URL}" ]; then
            echo "SLACK_WEBHOOK_URL not set — skipping notification"
            exit 0
          fi
          if ! command -v jq >/dev/null 2>&1; then
            sudo apt-get update -qq
            sudo apt-get install -y -qq jq > /dev/null
          fi

          REASON_FILE=".github/sp1-e2e/e2e-failure-reason.txt"
          if [ -s "${REASON_FILE}" ]; then
            FAILURE_REASON="$(cat "${REASON_FILE}")"
          else
            FAILURE_REASON="Workflow failed before SP1 E2E produced a failure reason. Check the failed job step."
          fi

          PAYLOAD=$(jq -n \
            --arg image_tag "${IMAGE_TAG}" \
            --arg run_url "${RUN_URL}" \
            --arg reason "${FAILURE_REASON}" \
            '{text: "🚨 *SP1 E2E Test Failed* — commit `\($image_tag)`\n<\($run_url)|View run>\nReason: \($reason)"}')

          curl -sf -X POST "${SLACK_WEBHOOK_URL}" \
            -H 'Content-Type: application/json' \
            -d "${PAYLOAD}"
