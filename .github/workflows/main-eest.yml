name: Ethereum Execution Spec tests against main branch (via fntests).

on:
  schedule:
    - cron: "30 1 * * *" # every day at 1:30 AM UTC
  workflow_dispatch:
    inputs:
      eest_pytest_args:
        description: "Optional EEST pytest selector/options for subset debugging."
        required: false
        default: ""
      proof_timeout:
        description: "Max seconds to wait for EE chunk proof coverage."
        required: false
        default: "3600"

env:
  CARGO_TERM_COLOR: always

permissions: {}

jobs:
  extract-rust-version:
    name: Extract Rust toolchain version
    runs-on: ubuntu-latest
    outputs:
      rust-version: ${{ steps.extract.outputs.rust-version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Extract Rust toolchain version
        id: extract
        uses: ./.github/actions/extract-rust-version # zizmor: ignore[unpinned-uses]

  run:
    name: Run functional tests
    runs-on: ubuntu-latest
    needs: extract-rust-version
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Cleanup Space
        uses: ./.github/actions/cleanup # zizmor: ignore[unpinned-uses]

      - name: Install bitcoind
        env:
          BITCOIND_VERSION: "30.2"
          BITCOIND_ARCH: "x86_64-linux-gnu"
        run: |
          curl -fsSLO --proto "=https" --tlsv1.3 "https://bitcoincore.org/bin/bitcoin-core-$BITCOIND_VERSION/bitcoin-$BITCOIND_VERSION-$BITCOIND_ARCH.tar.gz"
          curl -fsSLO --proto "=https" --tlsv1.3 "https://bitcoincore.org/bin/bitcoin-core-$BITCOIND_VERSION/SHA256SUMS"
          sha256sum --ignore-missing --check SHA256SUMS
          tar xzf "bitcoin-$BITCOIND_VERSION-$BITCOIND_ARCH.tar.gz"
          sudo install -m 0755 -t /usr/local/bin bitcoin-"$BITCOIND_VERSION"/bin/*
          bitcoind --version
          rm -rf SHA256SUMS "bitcoin-$BITCOIND_VERSION" "bitcoin-$BITCOIND_VERSION-$BITCOIND_ARCH.tar.gz"

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          working-directory: functional-tests
          activate-environment: true
          enable-cache: true
          cache-suffix: "functional-tests"

      - name: Set up Rust
        env:
          RUST_NIGHTLY: ${{ needs.extract-rust-version.outputs.rust-version }}
        run: |
          rustup toolchain install "$RUST_NIGHTLY" --profile minimal
          rustup default "$RUST_NIGHTLY"

      - name: Install protoc
        uses: arduino/setup-protoc@c65c819552d16ad3c9b72d9dfd5ba5237b9c906b # v3.0.0
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Rust cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          cache-on-failure: true

      - name: Install SP1 core runner override
        uses: ./.github/actions/sp1-core-runner-override # zizmor: ignore[unpinned-uses]

      - name: Build Cargo project
        run: |
          cargo build --locked --release -F sequencer -F debug-utils -F test-mode -F debug-asm -F prover --bin strata --bin strata-signer --bin alpen-client --bin strata-datatool --bin strata-test-cli --bin strata-dbtool

      - name: Run alpen EEST env in fntests
        env:
          NO_COLOR: "1"
          LOG_LEVEL: "info"
        run: |
          sudo apt-get install -y screen
          NEWPATH="$(realpath target/release/)"
          export PATH="${NEWPATH}:${PATH}"
          which alpen-client
          cd functional-tests
          screen -L -Logfile alpen_eest_env.screen.log -dmS alpen_eest_env uv run python entry.py --keep-alive alpen_eest
          if ! ../contrib/wait-for-json-rpc.sh http://localhost:30303 240; then
            cat alpen_eest_env.screen.log || true
            [ ! -d _dd ] || find _dd -type f -name "service.log" -print -exec tail -100 {} \;
            exit 1
          fi

      - name: Run tests
        id: runtests
        env:
          EEST_PYTEST_ARGS: ${{ github.event.inputs.eest_pytest_args || '' }}
        run: |
          args=(
            --rpc-endpoint http://localhost:30303
            --fork Prague
            --tx-wait-timeout 120
          )
          if [[ -n "${EEST_PYTEST_ARGS}" ]]; then
            args+=(--pytest-args "${EEST_PYTEST_ARGS}")
          fi
          ./contrib/run-eest-remote.sh "${args[@]}"
        continue-on-error: true

      - name: Capture EEST end block
        if: always() && steps.runtests.outcome != 'skipped'
        run: |
          END_BLOCK="$(curl -sf -X POST http://localhost:30303 \
            -H "Content-Type: application/json" \
            -d '{"jsonrpc":"2.0","method":"eth_blockNumber","params":[],"id":1}' \
            | python3 -c 'import json,sys; print(int(json.load(sys.stdin)["result"], 16))')"
          echo "EEST_END_BLOCK=${END_BLOCK}" >> "${GITHUB_ENV}"

      - name: Assert EEST blocks covered by EE chunk proofs
        if: always() && steps.runtests.outcome != 'skipped'
        env:
          EEST_PROOF_TIMEOUT: ${{ github.event.inputs.proof_timeout || '3600' }}
        run: |
          if ! ./contrib/assert-eest-prover-pipeline.sh \
              --rpc-endpoint http://localhost:30303 \
              --bitcoin-rpc-url http://user:password@localhost:18444 \
              --bitcoin-wallet testwallet \
              --start-block 1 \
              --end-block "${EEST_END_BLOCK}" \
              --timeout "${EEST_PROOF_TIMEOUT}"; then
            cat functional-tests/alpen_eest_env.screen.log || true
            [ ! -d functional-tests/_dd ] || find functional-tests/_dd -type f -name "service.log" -print -exec tail -200 {} \;
            exit 1
          fi

      - name: Stop service
        if: always()
        run: |
          screen -S alpen_eest_env -X quit || true

      - name: Check tests execution
        if: steps.runtests.outcome == 'failure'
        run: |
          echo "Functional tests failed"
          exit 1
