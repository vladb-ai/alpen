name: Run functional tests

on:
  workflow_call:

env:
  CARGO_TERM_COLOR: always

permissions: {}

jobs:
  extract-rust-version:
    name: Extract Rust toolchain version
    runs-on: ubuntu-latest
    outputs:
      rust-version: ${{ steps.extract.outputs.rust-version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Extract Rust toolchain version
        id: extract
        uses: ./.github/actions/extract-rust-version # zizmor: ignore[unpinned-uses]

  lint:
    name: Lint test files
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          working-directory: functional-tests
          activate-environment: true
          enable-cache: true
          cache-suffix: "functional-tests"

      - name: Check formatting
        working-directory: functional-tests
        run: uv run ruff format --check

      - name: Lint
        working-directory: functional-tests
        run: uv run ruff check

  run:
    name: Run functional tests
    runs-on: ubuntu-latest-m
    needs: extract-rust-version
    timeout-minutes: 60
    env:
      # generating build artifacts and coverage data in default dir for cargo-llvm-cov
      CARGO_TARGET_DIR: "${{ github.workspace }}/target/llvm-cov-target"
      LLVM_PROFILE_FILE: "${{ github.workspace }}/target/llvm-cov-target/strata-%p-%m.profraw"

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Cleanup Space
        uses: ./.github/actions/cleanup # zizmor: ignore[unpinned-uses]

      - name: Install bitcoind
        env:
          BITCOIND_VERSION: "30.2"
          BITCOIND_ARCH: "x86_64-linux-gnu"
        run: |
          curl -fsSLO --proto "=https" --tlsv1.3 "https://bitcoincore.org/bin/bitcoin-core-$BITCOIND_VERSION/bitcoin-$BITCOIND_VERSION-$BITCOIND_ARCH.tar.gz"
          curl -fsSLO --proto "=https" --tlsv1.3 "https://bitcoincore.org/bin/bitcoin-core-$BITCOIND_VERSION/SHA256SUMS"
          sha256sum --ignore-missing --check SHA256SUMS
          tar xzf "bitcoin-$BITCOIND_VERSION-$BITCOIND_ARCH.tar.gz"
          sudo install -m 0755 -t /usr/local/bin bitcoin-"$BITCOIND_VERSION"/bin/*
          bitcoind --version
          rm -rf SHA256SUMS "bitcoin-$BITCOIND_VERSION" "bitcoin-$BITCOIND_VERSION-$BITCOIND_ARCH.tar.gz"

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          working-directory: functional-tests
          activate-environment: true
          enable-cache: true
          cache-suffix: "functional-tests"

      - name: Set up Rust
        env:
          RUST_NIGHTLY: ${{ needs.extract-rust-version.outputs.rust-version }}
        run: |
          rustup toolchain install "$RUST_NIGHTLY" --profile minimal
          rustup default "$RUST_NIGHTLY"

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@b8cecb83565409bcc297b2df6e77f030b2a468d5 # v2.82.0
        with:
          tool: cargo-llvm-cov

      - name: Install protoc
        uses: arduino/setup-protoc@c65c819552d16ad3c9b72d9dfd5ba5237b9c906b # v3.0.0
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Rust cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          cache-on-failure: true

      - name: Install SP1 core runner override
        uses: ./.github/actions/sp1-core-runner-override # zizmor: ignore[unpinned-uses]

      - name: Build Cargo project
        env:
          RUSTFLAGS: "-Cinstrument-coverage"
        run: cargo build --locked -F sequencer -F debug-utils -F test-mode -F debug-asm -F prover --bin strata --bin strata-signer --bin alpen-client --bin strata-datatool --bin strata-test-cli --bin strata-dbtool

      - name: Run functional tests
        id: funcTestsRun
        env:
          RUST_LOG: "debug,sled=warn,hyper=warn,h2=warn,soketto=warn,jsonrpsee-server=warn,mio=warn"
          NO_COLOR: "1"
          RUST_BACKTRACE: "1"
          LOG_LEVEL: "info"
        run: |
          export PATH="${{ github.workspace }}/target/llvm-cov-target/debug:$PATH"
          which strata
          which alpen-client
          cd functional-tests && uv run python entry.py

      - name: Generate combined coverage lcov
        if: always()
        id: genFunctionalLcov
        continue-on-error: true
        env:
          # cargo-llvm-cov expects default target dir and adds llvm-cov-target itself
          CARGO_TARGET_DIR: "${{ github.workspace }}/target"
        run: |
          cargo llvm-cov -F debug-utils report --lcov > lcov.functional.info

      - name: Upload coverage lcov artifact
        if: always() && hashFiles('lcov.functional.info') != ''
        continue-on-error: true
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: functional-lcov
          path: lcov.functional.info

      - name: Zip log files on failure
        if: failure()
        # Create a zip archive (logs.zip) that includes only service.log files,
        # preserving the folder structure starting from functional-tests/_dd
        # NOTE: Entire _dd ends up hundreds of MBs, so keep only logs (still huge...).
        run: |
          # service logs
          find functional-tests/_dd -type f -name "service.log" 2>/dev/null | zip -@ logs.zip || true
          # functional test logs
          zip -r logs.zip functional-tests/_dd -i '*/logs/*.log' 2>/dev/null || true

      - name: Upload logs as build artifact on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: fntest_dd
          path: logs.zip
          retention-days: 30
          if-no-files-found: error
          compression-level: 0 # already compressed

  functional-tests-success:
    name: Check that all checks pass
    runs-on: ubuntu-latest
    if: always()
    needs: [lint, run]
    timeout-minutes: 60
    steps:
      - name: Decide whether the needed jobs succeeded or failed
        uses: re-actors/alls-green@05ac9388f0aebcb5727afa17fcccfecd6f8ec5fe # release/v1
        with:
          jobs: ${{ toJSON(needs) }}
