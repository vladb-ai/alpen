name: Provision Grafana Dashboard

# Run this workflow manually or on push to update dashboard
on:
  workflow_dispatch:  # Manual trigger
  push:
    paths:
      - '.github/scripts/grafana/dashboard.json'
      - '.github/scripts/grafana/provision.py'
      - '.github/workflows/provision-grafana-dashboard.yml'
    branches:
      - main

permissions:
  contents: read

jobs:
  provision:
    name: Provision dashboard to Grafana Cloud
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Provision dashboard
        env:
          GRAFANA_URL: ${{ secrets.GRAFANA_URL }} # zizmor: ignore[secrets-outside-env]
          GRAFANA_SERVICE_ACCOUNT_TOKEN: ${{ secrets.GRAFANA_SERVICE_ACCOUNT_TOKEN }} # zizmor: ignore[secrets-outside-env]
        working-directory: .github/scripts/grafana
        run: |
          uv run --no-project python provision.py \
            --dashboard-file dashboard.json

      - name: Summary
        if: success()
        run: |
          {
            echo "Dashboard provisioned successfully"
            echo ""
            echo "View at: ${{ secrets.GRAFANA_URL }}/d/test-flakiness/test-flakiness-tracker" # zizmor: ignore[secrets-outside-env]
          } >> "$GITHUB_STEP_SUMMARY"
